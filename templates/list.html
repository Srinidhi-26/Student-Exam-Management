<nav class="navbar navbar-light bg-light">
  <form method="POST" class="form-inline" action="{{url_for('search')}}">
    <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search" name="searched">
    <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
    {% for result in results %}
  <div>{{result}}</div>
{% endfor %}
  </form>
</nav>

<table class='table table-bordered'>
    <thead>
      <th>SID</th>
      <th>Name</th>
      <th>Phone</th>
      <th>Email Id</th>
      <th>Gender</th>
      <th>Stream</th>
      <th>Address</th>
      <th>YOP</th>
      <th>Edit</th>
      <th>Delete</th>
    </thead>
    <tbody>
      {% for row in all %}
        <tr>
          <td>{{loop.index}}</td>
          <td>{{row.name}}</td>
          <td>{{row.phno}}</td>
          <td>{{row.email}}</td>
          <td>{{row.gender}}</td>
          <td>{{row.stream}}</td>
          <td>{{row.address}}</td>
          <td>{{row.yop}}</td>
            <td><a href='{{url_for("edit_student",id=row.id)}}' class='btn btn-primary'>Edit</a></td>
          <td><a href='{{url_for("delete_student",id=row.id)}}' class='btn btn-danger' onclick='return confirm("Confirm delete")'>Delete</a></td>
        </tr>
      {%endfor%}
    </tbody>
  </table>
