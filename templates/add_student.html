{% extends 'intro.html' %}
{% block body %}
<div class="row">
    <div class="col-5 mx-auto">
        <h3>Create Student</h3>
        <form method="post" action="{{url_for('add_student')}}">
            <div class="form-group">
                <label>Student Name</label>
                <input type="text" name="name" required class="form-control">
            </div>
             <div class="'form-group">
                <label>Phone Number</label>
                <input type="text" name="phonenumber" required class="form-control">
            </div>
             <div class="'form-group">
                <label>Email Id</label>
                <input type="text" name="email" required class="form-control">
            </div>
            <div class="'form-group">
                <label>Gender</label>
                <input type="text" name="gender" required class="form-control">
            </div>
            <div class="'form-group">
                <label>Stream</label>
                <input type="text" name="stream" required class="form-control">
            </div>
             <div class="'form-group">
                <label>Contact Address</label>
                <input type="text" name="address" required class="form-control">
            </div>
            <div class="'form-group">
                <label>YOP</label>
                <input type="text" name="yop" required class="form-control">
            </div>
            <input type="submit" value="submit" class="btn btn-primary">
        </form>
    </div>
</div>
{% endblock %}
