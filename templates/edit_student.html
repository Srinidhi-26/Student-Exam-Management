{% extends 'intro.html' %}
{% block body %}
  <div class='row'>
    <div class='col-5 mx-auto'>
      <h3>Edit Student</h3><hr>
      <form method='POST' action='/edit_student/{{student_to_update.id}}'>
        <div class='form-group'>
          <label for="name">Student Name</label>
          <input type='text' name='name' required class='form-control' value='{{student_to_update.name}}'>
        </div>
        <div class='form-group'>
          <label for="phno">Phone</label>
          <input type='text' name='phonenumber' required class='form-control' value='{{student_to_update.phno}}'>
        </div>
         <div class='form-group'>
          <label for="email">Email</label>
          <input type='text' name='email' required class='form-control' value='{{student_to_update.email}}'>
        </div>
         <div class='form-group'>
          <label for="gender">Gender</label>
          <input type='text' name='gender' required class='form-control' value='{{student_to_update.gender}}'>
        </div>
         <div class='form-group'>
          <label for="stream">Stream</label>
          <input type='text' name='stream' required class='form-control' value='{{student_to_update.stream}}'>
        </div>
         <div class='form-group'>
          <label for="address">Address</label>
          <input type='text' name='address' required class='form-control' value='{{student_to_update.address}}'>
        </div>
         <div class='form-group'>
          <label for="yop">YOP</label>
          <input type='text' name='yop' required class='form-control' value='{{student_to_update.yop}}'>
        </div>
        <input type='submit' value='Submit' class='btn btn-primary'>
      </form>
    </div>
  </div>
{% endblock %}
